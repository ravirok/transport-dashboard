<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Transport Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    body { font-family: Arial, sans-serif; margin: 20px; }
    header { margin-bottom: 20px; }
    table { border-collapse: collapse; width: 100%; margin-bottom: 20px; }
    th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
    th { background-color: #f2f2f2; }
    tr.failed { background-color: #ffe6e6; cursor: pointer; }
    .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; overflow: auto;
             background-color: rgba(0,0,0,0.5); }
    .modal-content { background-color: #fff; margin: 10% auto; padding: 20px; width: 80%; border-radius: 8px; }
    .close { float: right; cursor: pointer; font-weight: bold; }
    .risk-card { display: inline-block; padding: 10px 20px; margin-right: 20px; border-radius: 8px; color: #fff; font-weight: bold; }
    .risk-high { background-color: #e74c3c; }
    .risk-medium { background-color: #f39c12; }
    .risk-low { background-color: #27ae60; }
  </style>
</head>
<body>
  <header>
    <h1>Transport Dashboard</h1>
    <div id="risk-container"></div>
  </header>
  <main>
    <div id="root"></div>
    <canvas id="statusChart" width="400" height="150"></canvas>
  </main>
  <div id="modal" class="modal">
    <div class="modal-content">
      <span class="close" id="closeModal">&times;</span>
      <div id="modalContent"></div>
    </div>
  </div>
  <script src="./bundle.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TransTrack Pro Dashboard</title>

  <!-- Tailwind CSS via CDN -->
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@3.3.3/dist/tailwind.min.css" rel="stylesheet">

  <!-- Favicon -->
  <link rel="icon" type="image/x-icon" href="./favicon.ico" />

  <!-- Prevent caching (optional for dev) -->
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
</head>
<body class="bg-gray-100 font-sans">

  <!-- Header -->
  <header class="bg-blue-600 text-white p-4 text-center font-bold text-2xl">
    TransTrack Pro Dashboard
  </header>

  <!-- React root -->
  <main class="p-6">
    <div id="root"></div>
  </main>

  <!-- Footer -->
  <footer class="bg-gray-200 text-center p-4 mt-6">
    &copy; 2026 TransTrack Pro
  </footer>

  <!-- React dashboard bundle.js (versioned to avoid 304 cache issues) -->
  <script src="./bundle.js?v=1.0.8"></script>
</body>
</html>

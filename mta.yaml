ID: transport_dashboard_mta
_schema-version: "3.3"
version: 1.0.0

modules:

  - name: transport-dashboard-backend
    type: nodejs
    path: backend
    parameters:
      memory: 1024M
      disk-quota: 1024M
      buildpack: nodejs_buildpack

  - name: transport-dashboard-frontend
    type: html5
    path: frontend   # build output folder
    parameters:
      memory: 512M
      disk-quota: 512M
      url: /            # serve at root
      authentication: none
